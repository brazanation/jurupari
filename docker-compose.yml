version: '3.8'
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: jurupari
      POSTGRES_USER: jurupari
      POSTGRES_PASSWORD: jurupari
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jurupari"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  pgdata:
